aid: taddy-api
name: Taddy API
description: >-
  Taddy provides a GraphQL-based podcast API giving developers access to over 4 million podcasts and 200 million
  episodes with real-time search, episode transcripts, webhooks, top charts, and comic book data. Taddy simplifies
  building podcast applications by aggregating and standardizing RSS feed data at scale with daily updates of 1,000 new
  podcasts and 50,000 new episodes.
type: Index
position: Consumer
access: 3rd-Party
